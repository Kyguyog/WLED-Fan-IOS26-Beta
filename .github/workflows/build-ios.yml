name: Build Unsigned WLED Fan App

on:
  workflow_dispatch: # Lets you manually trigger the build from GitHub

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Unsigned Archive
        run: |
          # If your Xcode project file has a slightly different name, update it here:
          xcodebuild archive \
            -project WLED-Fan-IOS26-Beta.xcodeproj \
            -scheme WLED-Fan-IOS26-Beta \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/WLED.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package into IPA
        run: |
          mkdir -p Payload
          mv build/WLED.xcarchive/Products/Applications/*.app Payload/
          zip -r WLED-Fan.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WLED-Fan-Unsigned-IPA
          path: WLED-Fan.ipa
